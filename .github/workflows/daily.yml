name: Daily Automated Commit

on:
  schedule:
    - cron: "15 10 * * *"   # Runs daily at 10:15 UTC (specific time, no wildcards)
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2003684@ds.study.iitm.ac.in"

      - name: 24f2003684@ds.study.iitm.ac.in - Create Daily Commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date)" || echo "No changes to commit"
          git push
